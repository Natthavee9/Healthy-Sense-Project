services:
  backend:
    build: ./backend
    container_name: healthy-sense-backend
    ports:
      - "7860:7860"
    env_file:
    - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: healthy-sense-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
